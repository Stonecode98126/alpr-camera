<script>
    const video = document.getElementById('video');
    const mainCanvas = document.getElementById('mainCanvas');
    const plateDisplay = document.getElementById('plateDisplay');
    const snapBtn = document.getElementById('snapBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusDiv = document.getElementById('statusDiv');
    const scanLine = document.getElementById('scanLine');

    let gpsAddr = "定位搜尋中...";
    let latLon = "";

    // GPS 定位
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async pos => {
            const { latitude: lat, longitude: lon } = pos.coords;
            latLon = `GPS: ${lat.toFixed(5)}, ${lon.toFixed(5)}`;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=zh-TW`);
                const data = await res.json();
                gpsAddr = data.display_name.split(',').slice(0, 4).reverse().join(' ').trim();
                statusDiv.textContent = `📍 ${gpsAddr}`;
            } catch(e) { gpsAddr = latLon; statusDiv.textContent = "📍 " + latLon; }
        }, null, { enableHighAccuracy: true });
    }

    // 啟動相機
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => { video.srcObject = stream; statusDiv.textContent = "✅ 設備就緒"; })
        .catch(() => { statusDiv.textContent = "❌ 無法開啟相機"; });

    // Gemini API 呼叫函式（透過 Cloudflare Worker）
    async function recognizePlateGemini(base64Image) {
        const url = `https://raspy-scene-c753.owen163.workers.dev/`;

        const payload = {
            contents: [{
                parts: [
                    { text: "這是一張台灣車牌的照片，請只辨識出車牌號碼並以 'AAA-0000' 或 'AA-0000' 的格式輸出，不要回答任何額外的文字。" },
                    { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                ]
            }]
        };

        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (data.error) {
                statusDiv.textContent = `❌ API錯誤: ${data.error.code} - ${data.error.message}`;
                return "辨識失敗";
            }
            return data.candidates[0].content.parts[0].text.trim();
        } catch (e) {
            statusDiv.textContent = `❌ 網路錯誤: ${e.message}`;
            return "辨識失敗";
        }
    }

    snapBtn.addEventListener('click', async () => {
        snapBtn.disabled = true;
        snapBtn.textContent = "⌛ Gemini 辨識中...";
        scanLine.classList.add('on');

        const ctx = mainCanvas.getContext('2d');
        const vw = video.videoWidth;
        const vh = video.videoHeight;
        mainCanvas.width = vw;
        mainCanvas.height = vh;
        ctx.drawImage(video, 0, 0, vw, vh);

        // 裁切紅框進行辨識（對應 CSS 45%）
        const cropCanvas = document.createElement('canvas');
        const cropCtx = cropCanvas.getContext('2d');
        const rw = vw * 0.45, rh = rw / 3;
        const rx = (vw - rw) / 2, ry = (vh - rh) / 2;
        cropCanvas.width = rw; cropCanvas.height = rh;
        cropCtx.drawImage(mainCanvas, rx, ry, rw, rh, 0, 0, rw, rh);

        const base64Data = cropCanvas.toDataURL('image/jpeg', 0.8).split(',')[1];

        // 呼叫 Gemini
        const plate = await recognizePlateGemini(base64Data);
        plateDisplay.textContent = plate;
        plateDisplay.classList.toggle('ok', plate !== "辨識失敗");

        // 繪製浮水印
        addWatermark(mainCanvas, plate);

        // 壓縮存檔
        const outCanvas = document.createElement('canvas');
        const outCtx = outCanvas.getContext('2d');
        const TARGET_W = 1280;
        const scale = TARGET_W / vw;
        outCanvas.width = TARGET_W;
        outCanvas.height = vh * scale;
        outCtx.drawImage(mainCanvas, 0, 0, outCanvas.width, outCanvas.height);

        const finalImg = outCanvas.toDataURL('image/jpeg', 0.6);
        document.getElementById('photo').src = finalImg;
        downloadBtn.href = finalImg;
        downloadBtn.download = `XinJiang_${plate}.jpg`;

        document.getElementById('fileSizeInfo').textContent = `[ 壓縮後尺寸：1280px | 預估大小: ${Math.round(finalImg.length/1350)} KB ]`;
        document.getElementById('previewSection').style.display = 'block';

        snapBtn.disabled = false;
        snapBtn.textContent = "📸 拍照並啟動 AI 辨識";
        scanLine.classList.remove('on');
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    });

    function addWatermark(can, plate) {
        const ctx = can.getContext('2d');
        const W = can.width, H = can.height;
        const now = new Date();
        const p = x => String(x).padStart(2, '0');
        const timeStr = `${now.getFullYear()}-${p(now.getMonth()+1)}-${p(now.getDate())} ${p(now.getHours())}:${p(now.getMinutes())}:${p(now.getSeconds())}`;
        const base = W * 0.035;

        // 背景漸層
        const grad = ctx.createLinearGradient(0, H - base*11, 0, H);
        grad.addColorStop(0, 'transparent');
        grad.addColorStop(1, 'rgba(0,0,0,0.85)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, H - base*11, W, base*11);

        // 車牌文字 + 黃色描邊
        ctx.font = `bold ${base * 3.4}px monospace`;
        ctx.textAlign = "left";
        ctx.strokeStyle = "#FFD700";
        ctx.lineWidth = base * 0.9;
        ctx.lineJoin = "round";
        ctx.strokeText(plate, 20, H - base * 6.2);
        ctx.fillStyle = "#ff3322";
        ctx.fillText(plate, 20, H - base * 6.2);

        // 日期
        ctx.fillStyle = "white";
        ctx.font = `bold ${base * 2.2}px sans-serif`;
        ctx.fillText(timeStr, 22, H - base * 3.9);

        // 地址與座標
        ctx.font = `${base * 1.1}px sans-serif`;
        ctx.fillText(`📍 ${gpsAddr}`, 24, H - base * 2.3);
        ctx.fillStyle = "rgba(255,255,255,0.65)";
        ctx.font = `${base * 0.9}px monospace`;
        ctx.fillText(latLon, 24, H - base * 0.9);
    }
</script>
