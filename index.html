<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鑫將數位行銷 — Gemini 視覺相機</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: #0a0a0a; color: #e5e2e1;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding-bottom: 40px;
        }

        /* ── HEADER ── */
        .header { width: 100%; max-width: 500px; display: flex; align-items: center; justify-content: space-between; padding: 16px 14px 8px; }
        .header .brand { font-size: 17px; font-weight: 700; letter-spacing: .06em; color: #ff3322; }
        .header .sub { font-size: 10px; letter-spacing: .14em; color: #555; margin-top: 1px; }
        .status-bar { width: 100%; max-width: 500px; padding: 6px 14px 10px; font-size: 12px; color: #888; line-height: 1.5; min-height: 38px; }

        /* ── 相機預覽 ── */
        .cam-wrapper { width: 100%; max-width: 500px; padding: 0 10px; position: relative; }
        #video { width: 100%; border-radius: 10px; display: block; background: #111; aspect-ratio: 4/3; object-fit: cover; }
        .reticle-overlay { position: absolute; inset: 0 10px; pointer-events: none; display: flex; align-items: center; justify-content: center; }
        .reticle { width: 45%; aspect-ratio: 3/1; position: relative; border: 1.5px solid rgba(255,51,34,.4); border-radius: 5px; }
        .reticle::before, .reticle::after, .reticle .c1, .reticle .c2 { content: ''; position: absolute; width: 15px; height: 15px; border-color: #ff3322; border-style: solid; }
        .reticle::before { top:-2px; left:-2px; border-width:3px 0 0 3px; }
        .reticle::after { top:-2px; right:-2px; border-width:3px 3px 0 0; }
        .reticle .c1 { bottom:-2px; left:-2px; border-width:0 0 3px 3px; }
        .reticle .c2 { bottom:-2px; right:-2px; border-width:0 3px 3px 0; }

        .scan-line { position: absolute; left: 0; right: 0; height: 2px; background: #ff3322; top: 0; opacity: 0; }
        .scan-line.on { animation: scan 1.5s linear infinite; opacity: 1; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* ── 辨識結果 ── */
        .plate-box { width: 100%; max-width: 500px; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; }
        .plate-result { background: #111; border: 1px solid rgba(255,51,34,.3); border-radius: 6px; padding: 8px 15px; font-family: monospace; font-size: 24px; font-weight: 700; color: #ff3322; min-width: 160px; text-align: center; }
        .plate-result.ok { color: #4ade80; border-color: #4ade80; }

        /* ── 控制按鈕 ── */
        .controls { width: 100%; max-width: 500px; padding: 10px; }
        button { width: 100%; padding: 18px; margin: 8px 0; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.1s; }
        button:active { transform: scale(0.98); opacity: 0.8; }
        .btn-snap { background: #ff3322; color: white; box-shadow: 0 4px 15px rgba(255,51,34,0.4); }
        .btn-save { background: #ff9500; color: white; text-decoration: none; display: block; text-align: center; margin-top: 10px; padding: 18px; border-radius: 12px; font-size: 18px; font-weight: bold; }

        #previewSection { display: none; width: 100%; max-width: 500px; padding: 15px 10px; }
        #photo { width: 100%; border-radius: 10px; border: 1px solid #333; }
        .file-info { font-size: 11px; color: #666; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <div class="brand">鑫將數位行銷</div>
            <div class="sub">AI MULTIMODAL · GEMINI 2.5</div>
        </div>
        <div style="font-size:11px; color:#444;">V6.0 Worker</div>
    </div>

    <div id="statusDiv" class="status-bar">正在載入系統...</div>

    <div class="cam-wrapper">
        <video id="video" autoplay playsinline></video>
        <div class="reticle-overlay">
            <div class="reticle" id="reticle">
                <div class="c1"></div><div class="c2"></div>
                <div class="scan-line" id="scanLine"></div>
            </div>
        </div>
    </div>

    <div class="plate-box">
        <div class="plate-result" id="plateDisplay">等待掃描</div>
        <div style="font-size: 10px; color: #444; text-align: right;">Gemini 視覺模型<br>高精度 OCR 開啟</div>
    </div>

    <div class="controls">
        <button id="snapBtn" class="btn-snap">📸 拍照並啟動 AI 辨識</button>
        <div id="previewSection">
            <img id="photo">
            <div class="file-info" id="fileSizeInfo"></div>
            <a id="downloadBtn" class="btn-save">💾 儲存輕量化照片</a>
        </div>
    </div>

    <canvas id="mainCanvas" style="display:none;"></canvas>

    <script>
    document.addEventListener('DOMContentLoaded', function () {

        const video = document.getElementById('video');
        const mainCanvas = document.getElementById('mainCanvas');
        const plateDisplay = document.getElementById('plateDisplay');
        const snapBtn = document.getElementById('snapBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusDiv = document.getElementById('statusDiv');
        const scanLine = document.getElementById('scanLine');

        let gpsAddr = "定位搜尋中...";
        let latLon = "";

        // GPS 定位
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async pos => {
                const { latitude: lat, longitude: lon } = pos.coords;
                latLon = `GPS: ${lat.toFixed(5)}, ${lon.toFixed(5)}`;
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=zh-TW`);
                    const data = await res.json();
                    gpsAddr = data.display_name.split(',').slice(0, 4).reverse().join(' ').trim();
                    statusDiv.textContent = `📍 ${gpsAddr}`;
                } catch(e) {
                    gpsAddr = latLon;
                    statusDiv.textContent = "📍 " + latLon;
                }
            }, null, { enableHighAccuracy: true });
        }

        // 啟動相機
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
            .then(stream => {
                video.srcObject = stream;
                statusDiv.textContent = "✅ 設備就緒";
            })
            .catch(() => {
                statusDiv.textContent = "❌ 無法開啟相機";
            });

        // Gemini API 呼叫（透過 Cloudflare Worker）
        async function recognizePlateGemini(base64Image) {
            const url = `https://raspy-scene-c753.owen163.workers.dev/`;

            const payload = {
                contents: [{
                    parts: [
                        { text: "這是一張台灣車牌的照片，請只辨識出車牌號碼並以 'AAA-0000' 或 'AA-0000' 的格式輸出，不要回答任何額外的文字。" },
                        { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                    ]
                }]
            };

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (data.error) {
                    statusDiv.textContent = `❌ API錯誤: ${data.error.code} - ${data.error.message}`;
                    return "辨識失敗";
                }
                return data.candidates[0].content.parts[0].text.trim();
            } catch (e) {
                statusDiv.textContent = `❌ 網路錯誤: ${e.message}`;
                return "辨識失敗";
            }
        }

        // 拍照按鈕
        snapBtn.addEventListener('click', async () => {
            snapBtn.disabled = true;
            snapBtn.textContent = "⌛ Gemini 辨識中...";
            scanLine.classList.add('on');

            const ctx = mainCanvas.getContext('2d');
            const vw = video.videoWidth;
            const vh = video.videoHeight;
            mainCanvas.width = vw;
            mainCanvas.height = vh;
            ctx.drawImage(video, 0, 0, vw, vh);

            // 裁切紅框進行辨識（對應 CSS 45%）
            const cropCanvas = document.createElement('canvas');
            const cropCtx = cropCanvas.getContext('2d');
            const rw = vw * 0.45, rh = rw / 3;
            const rx = (vw - rw) / 2, ry = (vh - rh) / 2;
            cropCanvas.width = rw;
            cropCanvas.height = rh;
            cropCtx.drawImage(mainCanvas, rx, ry, rw, rh, 0, 0, rw, rh);

            const base64Data = cropCanvas.toDataURL('image/jpeg', 0.8).split(',')[1];

            // 呼叫 Gemini
            const plate = await recognizePlateGemini(base64Data);
            plateDisplay.textContent = plate;
            plateDisplay.classList.toggle('ok', plate !== "辨識失敗");

            // 繪製浮水印
            addWatermark(mainCanvas, plate);

            // 壓縮存檔 1280px
            const outCanvas = document.createElement('canvas');
            const outCtx = outCanvas.getContext('2d');
            const TARGET_W = 1280;
            const scale = TARGET_W / vw;
            outCanvas.width = TARGET_W;
            outCanvas.height = vh * scale;
            outCtx.drawImage(mainCanvas, 0, 0, outCanvas.width, outCanvas.height);

            const finalImg = outCanvas.toDataURL('image/jpeg', 0.6);
            document.getElementById('photo').src = finalImg;
            downloadBtn.href = finalImg;
            downloadBtn.download = `XinJiang_${plate}.jpg`;

            document.getElementById('fileSizeInfo').textContent = `[ 壓縮後尺寸：1280px | 預估大小: ${Math.round(finalImg.length/1350)} KB ]`;
            document.getElementById('previewSection').style.display = 'block';

            snapBtn.disabled = false;
            snapBtn.textContent = "📸 拍照並啟動 AI 辨識";
            scanLine.classList.remove('on');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        });

        // 浮水印
        function addWatermark(can, plate) {
            const ctx = can.getContext('2d');
            const W = can.width, H = can.height;
            const now = new Date();
            const p = x => String(x).padStart(2, '0');
            const timeStr = `${now.getFullYear()}-${p(now.getMonth()+1)}-${p(now.getDate())} ${p(now.getHours())}:${p(now.getMinutes())}:${p(now.getSeconds())}`;
            const base = W * 0.035;

            // 背景漸層
            const grad = ctx.createLinearGradient(0, H - base*11, 0, H);
            grad.addColorStop(0, 'transparent');
            grad.addColorStop(1, 'rgba(0,0,0,0.85)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, H - base*11, W, base*11);

            // 車牌文字 + 黃色描邊
            ctx.font = `bold ${base * 3.4}px monospace`;
            ctx.textAlign = "left";
            ctx.strokeStyle = "#FFD700";
            ctx.lineWidth = base * 0.9;
            ctx.lineJoin = "round";
            ctx.strokeText(plate, 20, H - base * 6.2);
            ctx.fillStyle = "#ff3322";
            ctx.fillText(plate, 20, H - base * 6.2);

            // 日期
            ctx.fillStyle = "white";
            ctx.font = `bold ${base * 2.2}px sans-serif`;
            ctx.fillText(timeStr, 22, H - base * 3.9);

            // 地址
            ctx.font = `${base * 1.1}px sans-serif`;
            ctx.fillText(`📍 ${gpsAddr}`, 24, H - base * 2.3);

            // GPS 座標
            ctx.fillStyle = "rgba(255,255,255,0.65)";
            ctx.font = `${base * 0.9}px monospace`;
            ctx.fillText(latLon, 24, H - base * 0.9);
        }

    }); // DOMContentLoaded 結束
    </script>
</body>
</html>
